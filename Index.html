<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>KRAZY SENSI.IA</title>

<style>
body{
margin:0;
font-family:Arial;
background:#05000a;
color:white;
}

.header{
text-align:center;
padding:20px;
font-size:28px;
color:#c300ff;
text-shadow:0 0 20px #c300ff;
cursor:pointer;
}

.container{
padding:15px;
}

.card{
background:#111;
padding:15px;
border-radius:15px;
margin-bottom:15px;
box-shadow:0 0 20px #c300ff33;
}

select,input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:10px;
border:none;
background:#1a1a1a;
color:white;
}

button{
margin-top:10px;
padding:12px;
width:100%;
border:none;
border-radius:12px;
background:#c300ff;
color:white;
font-weight:bold;
cursor:pointer;
transition:.2s;
}

button:active{
transform:scale(0.95);
background:#8a00b3;
}

.tabs{
display:flex;
gap:10px;
}

.tab{
flex:1;
background:#1a1a1a;
padding:10px;
text-align:center;
border-radius:10px;
cursor:pointer;
}

.active{
background:#c300ff;
}

.result{
margin-top:10px;
background:#000;
padding:10px;
border-radius:10px;
}

.hidden{display:none;}
</style>
</head>

<body>

<div class="header" onclick="clickTitulo()">KRAZY SENSI.IA <span id="vip"></span></div>

<div class="container">

<!-- LOGIN -->
<div class="card" id="login">
<input id="key" placeholder="Digite sua key">
<button onclick="login()">Entrar</button>
<p id="msg"></p>
</div>

<!-- APP -->
<div id="app" class="hidden">

<div class="tabs">
<div class="tab active" onclick="abrir('gerador',this)">⚙️ Gerar</div>
<div class="tab" onclick="abrir('salvas',this)">⭐ Salvas</div>
<div class="tab" onclick="abrir('famosos',this)">🌟 Famosos</div>
</div>

<!-- GERADOR -->
<div id="gerador" class="card">

<select id="modo"></select>

<select id="celular">
<option>Android Fraco</option>
<option>Android Médio</option>
<option>Android Forte</option>
<option>iPhone</option>
</select>

<button onclick="gerar()">GERAR</button>

<div id="res" class="result hidden"></div>

<button onclick="salvar()">Salvar ⭐</button>
<button onclick="copiar()">Copiar 📋</button>

</div>

<!-- SALVAS -->
<div id="salvas" class="card hidden"></div>

<!-- FAMOSOS -->
<div id="famosos" class="card hidden"></div>

</div>

<!-- ADM -->
<div id="adm" class="card hidden">
<input id="senha" placeholder="Senha ADM">
<button onclick="adm()">Entrar</button>

<div id="painel" class="hidden">
<button onclick="novaNormal()">Key Normal</button>
<button onclick="novaVIP()">Key VIP</button>
<p id="saida"></p>
</div>
</div>

</div>

<script>

let normal = localStorage.getItem("n") || "KRAZY123"
let vipKey = localStorage.getItem("v") || "VIP999"
let vip=false
let clicks=0
let atual=""

// LOGIN
function login(){
let k=document.getElementById("key").value

if(k===normal){vip=false; entrar()}
else if(k===vipKey){vip=true; entrar()}
else document.getElementById("msg").innerHTML="Key inválida"
}

function entrar(){
localStorage.setItem("log",1)
localStorage.setItem("vip",vip)

if(vip) document.getElementById("vip").innerHTML="👑"

document.getElementById("login").classList.add("hidden")
document.getElementById("app").classList.remove("hidden")

modos()
carregarSalvas()
carregarFamosos()
}

if(localStorage.getItem("log")){
vip=localStorage.getItem("vip")=="true"
entrar()
}

// MODOS
function modos(){
let m=document.getElementById("modo")
m.innerHTML=""

add("controle")
add("balanceado")
add("rapido")
if(vip) add("refinado")
}

function add(v){
let o=document.createElement("option")
o.value=v
o.innerText=v
modo.appendChild(o)
}

// GERAR
function gerar(){
let m=modo.value
let base = rand(100,180)

if(m=="controle") base=rand(80,120)
if(m=="rapido") base=rand(185,200)
if(m=="refinado") base=rand(140,170)

let res = `
Geral: ${base}
Red: ${base-10}
2x: ${base-15}
4x: ${base-20}
AWM: ${rand(40,70)}
Olhadinha: ${base+2}
`

atual=res

let r=document.getElementById("res")
r.innerHTML=res.replace(/\n/g,"<br>")
r.classList.remove("hidden")
}

// SALVAR
function salvar(){
let lista=JSON.parse(localStorage.getItem("salvas")||"[]")
lista.push(atual)
localStorage.setItem("salvas",JSON.stringify(lista))
carregarSalvas()
}

// MOSTRAR SALVAS
function carregarSalvas(){
let div=document.getElementById("salvas")
let lista=JSON.parse(localStorage.getItem("salvas")||"[]")

div.innerHTML=""
lista.forEach(s=>{
div.innerHTML+=`<div class="result">${s.replace(/\n/g,"<br>")}</div>`
})
}

// FAMOSOS
function carregarFamosos(){
let f=document.getElementById("famosos")

f.innerHTML=`
<div class="result">CEROL: Geral 150 / Red 140</div>
<div class="result">NOBRU: Geral 140 / Red 130</div>
<div class="result">WHITE444: Geral 170</div>
`
}

// COPIAR
function copiar(){
navigator.clipboard.writeText(atual)
}

// TABS
function abrir(id,el){
document.querySelectorAll(".card").forEach(c=>c.classList.add("hidden"))
document.getElementById(id).classList.remove("hidden")

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"))
el.classList.add("active")
}

// ADM
function clickTitulo(){
clicks++
if(clicks>=7){
document.getElementById("adm").classList.toggle("hidden")
clicks=0
}
}

function adm(){
if(senha.value==="krazyadm071110"){
painel.classList.remove("hidden")
}
}

function novaNormal(){
normal="KRAZY"+rand(1000,9999)
localStorage.setItem("n",normal)
saida.innerHTML=normal
}

function novaVIP(){
vipKey="VIP"+rand(1000,9999)
localStorage.setItem("v",vipKey)
saida.innerHTML=vipKey
}

function rand(a,b){
return Math.floor(Math.random()*(b-a+1))+a
}

</script>

</body>
              </html>
